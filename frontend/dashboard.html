<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Jockey — Intern Collaboration Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #080d1a;
    --surface: #0f172a;
    --surface2: #1a2540;
    --border: rgba(255,255,255,0.07);
    --accent: #f59e0b;
    --accent2: #fbbf24;
    --accent-dim: rgba(245,158,11,0.12);
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-soft: #94a3b8;
    --green: #10b981;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --sidebar-w: 240px;
    --radius: 14px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  h1,h2,h3,h4{font-family:'Syne',sans-serif}
  .hidden{display:none!important}

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:10px}

  /* ── TOAST ── */
  #toast-area{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px}
  .toast{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:12px 18px;border-radius:10px;font-size:13.5px;color:var(--text);animation:slideIn .3s ease;max-width:300px}
  .toast.success{border-left-color:var(--green)}.toast.error{border-left-color:var(--red)}.toast.info{border-left-color:var(--blue)}
  @keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes fadeOut{to{opacity:0;transform:translateX(30px)}}

  /* ══════════════════════════════════════
     LOGIN PAGE
  ══════════════════════════════════════ */
  #loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
  .login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%, rgba(245,158,11,0.08) 0%, transparent 60%),radial-gradient(ellipse at 70% 20%, rgba(59,130,246,0.06) 0%, transparent 50%)}
  .login-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:60px 60px}
  .login-card{position:relative;z-index:2;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:420px;box-shadow:0 40px 80px rgba(0,0,0,0.5)}
  .login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
  .login-logo-icon{width:42px;height:42px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#000;font-size:18px}
  .login-logo span{font-family:'Syne',sans-serif;font-weight:700;font-size:20px}
  .login-logo span em{color:var(--accent);font-style:normal}
  .login-card h2{font-size:26px;font-weight:700;margin-bottom:6px}
  .login-card p{color:var(--text-muted);font-size:13.5px;margin-bottom:28px}
  .field-group{margin-bottom:16px}
  .field-group label{display:block;font-size:12px;font-weight:500;color:var(--text-soft);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
  .field-group input,.field-group select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border .2s}
  .field-group input:focus,.field-group select:focus{border-color:var(--accent)}
  .field-group select option{background:var(--surface2)}
  .role-tabs{display:flex;gap:8px;margin-bottom:20px}
  .role-tab{flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;transition:all .2s;text-align:center}
  .role-tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
  .btn-primary{width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;margin-top:4px}
  .btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
  .domain-note{font-size:12px;color:var(--text-muted);text-align:center;margin-top:14px}
  .domain-note span{color:var(--accent)}

  /* ══════════════════════════════════════
     APP LAYOUT
  ══════════════════════════════════════ */
  #appLayout{display:flex;height:100vh;overflow:hidden}
  .sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
  .sidebar-header{padding:22px 20px 14px;border-bottom:1px solid var(--border)}
  .sidebar-logo{display:flex;align-items:center;gap:10px}
  .sidebar-logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#000;font-size:14px;flex-shrink:0}
  .sidebar-logo span{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
  .sidebar-logo span em{color:var(--accent);font-style:normal}
  .sidebar-user{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--accent);flex-shrink:0}
  .sidebar-user-info{overflow:hidden}
  .sidebar-user-info .uname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sidebar-user-info .urole{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
  .sidebar-nav{flex:1;padding:12px 10px}
  .nav-section-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;padding:8px 10px 4px;font-weight:600}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .18s;color:var(--text-soft);font-size:13.5px;font-weight:500;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left}
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:var(--accent-dim);color:var(--accent)}
  .nav-item svg{flex-shrink:0;opacity:.7}
  .nav-item.active svg{opacity:1}
  .nav-item.logout{color:var(--red);margin-top:auto}
  .nav-item.logout:hover{background:rgba(239,68,68,0.1)}
  .sidebar-bottom{padding:10px;border-top:1px solid var(--border)}
  .main-content{flex:1;overflow-y:auto;background:var(--bg)}
  .main-header{padding:22px 30px 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10;padding-bottom:10px;border-bottom:1px solid var(--border)}
  .page-title h2{font-size:22px;font-weight:700;line-height:1}
  .page-title p{font-size:13px;color:var(--text-muted);margin-top:4px}
  .header-actions{display:flex;align-items:center;gap:10px}
  .icon-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:9px;background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-soft);transition:all .2s;position:relative}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent)}
  .notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--accent);border-radius:50%;border:2px solid var(--bg)}
  .page-body{padding:24px 30px 30px}
  .section{display:none}
  .section.active{display:block}

  /* ── STAT CARDS ── */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s}
  .stat-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.12)}
  .stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--radius) var(--radius) 0 0}
  .stat-card.amber::after{background:var(--accent)}.stat-card.green::after{background:var(--green)}.stat-card.blue::after{background:var(--blue)}.stat-card.purple::after{background:var(--purple)}
  .stat-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
  .stat-icon.amber{background:rgba(245,158,11,0.12);color:var(--accent)}.stat-icon.green{background:rgba(16,185,129,0.12);color:var(--green)}.stat-icon.blue{background:rgba(59,130,246,0.12);color:var(--blue)}.stat-icon.purple{background:rgba(139,92,246,0.12);color:var(--purple)}
  .stat-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;line-height:1}
  .stat-label{font-size:12.5px;color:var(--text-muted);margin-top:4px}
  .stat-badge{position:absolute;top:18px;right:18px;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600}
  .stat-badge.up{background:rgba(16,185,129,0.12);color:var(--green)}.stat-badge.down{background:rgba(239,68,68,0.12);color:var(--red)}

  /* ── CHARTS ── */
  .charts-row{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:24px}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px}
  .chart-card h3{font-size:14px;font-weight:600;margin-bottom:18px;color:var(--text)}
  .chart-wrap{position:relative;height:200px}

  /* ── TABLES ── */
  .table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
  .table-card-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
  .table-card-header h3{font-size:15px;font-weight:600}
  .btn-sm{padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .2s}
  .btn-accent{background:var(--accent);color:#000}.btn-accent:hover{background:var(--accent2)}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-soft)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
  table{width:100%;border-collapse:collapse}
  thead tr{background:rgba(255,255,255,0.02)}
  th{text-align:left;padding:11px 20px;font-size:11.5px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px}
  td{padding:13px 20px;font-size:13.5px;border-top:1px solid var(--border)}
  tr:hover td{background:rgba(255,255,255,0.02)}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
  .badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
  .badge-green{background:rgba(16,185,129,0.12);color:var(--green)}.badge-green::before{background:var(--green)}
  .badge-red{background:rgba(239,68,68,0.12);color:var(--red)}.badge-red::before{background:var(--red)}
  .badge-amber{background:rgba(245,158,11,0.12);color:var(--accent)}.badge-amber::before{background:var(--accent)}
  .badge-blue{background:rgba(59,130,246,0.12);color:var(--blue)}.badge-blue::before{background:var(--blue)}
  .badge-purple{background:rgba(139,92,246,0.12);color:var(--purple)}.badge-purple::before{background:var(--purple)}
  .badge-gray{background:rgba(255,255,255,0.06);color:var(--text-soft)}.badge-gray::before{background:var(--text-soft)}
  .action-btn{padding:5px 11px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .2s}
  .action-approve{background:rgba(16,185,129,0.12);color:var(--green)}.action-approve:hover{background:rgba(16,185,129,0.2)}
  .action-reject{background:rgba(239,68,68,0.1);color:var(--red)}.action-reject:hover{background:rgba(239,68,68,0.2)}
  .action-view{background:rgba(59,130,246,0.1);color:var(--blue)}.action-view:hover{background:rgba(59,130,246,0.2)}
  .action-edit{background:rgba(245,158,11,0.1);color:var(--accent)}.action-edit:hover{background:rgba(245,158,11,0.2)}
  .priority-high{color:var(--red);font-weight:600}.priority-medium{color:var(--accent);font-weight:600}.priority-low{color:var(--green);font-weight:600}

  /* ── SEARCH & FILTER ── */
  .table-tools{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.01)}
  .search-input{flex:1;max-width:260px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
  .search-input:focus{border-color:var(--accent)}
  .filter-select{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer}
  .filter-select:focus{border-color:var(--accent)}

  /* ── PROGRESS BAR ── */
  .progress-bar{height:6px;background:var(--surface2);border-radius:10px;overflow:hidden}
  .progress-fill{height:100%;border-radius:10px;background:var(--accent);transition:width .4s}
  .progress-fill.green{background:var(--green)}.progress-fill.blue{background:var(--blue)}.progress-fill.red{background:var(--red)}

  /* ── AVATAR ── */
  .avatar{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0}
  .avatar-group{display:flex;align-items:center}.avatar-group .avatar{border:2px solid var(--surface);margin-left:-8px}.avatar-group .avatar:first-child{margin-left:0}

  /* ══════════════════════════════════════
     CHAT MODULE
  ══════════════════════════════════════ */
  .chat-layout{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 120px);gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .chat-sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column}
  .chat-sidebar-header{padding:16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px}
  .chat-search{padding:10px 14px;border-bottom:1px solid var(--border)}
  .chat-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
  .chat-list{flex:1;overflow-y:auto;padding:8px}
  .chat-contact{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:9px;cursor:pointer;transition:all .15s}
  .chat-contact:hover,.chat-contact.active{background:var(--surface2)}
  .chat-contact .cav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0;border:2px solid var(--border)}
  .chat-contact .cinfo{flex:1;min-width:0}
  .chat-contact .cname{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-contact .clast{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-unread{background:var(--accent);color:#000;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .chat-area{display:flex;flex-direction:column}
  .chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
  .chat-header .cav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0}
  .chat-header-info .cn{font-weight:600;font-size:14px}
  .chat-header-info .cs{font-size:12px;color:var(--green)}
  .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
  .msg{display:flex;gap:10px;max-width:70%}
  .msg.me{align-self:flex-end;flex-direction:row-reverse}
  .msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0;align-self:flex-end}
  .msg-bubble{padding:10px 14px;border-radius:14px;font-size:13.5px;line-height:1.55;max-width:100%}
  .msg .msg-bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}
  .msg.me .msg-bubble{background:var(--accent-dim);border:1px solid rgba(245,158,11,0.25);border-bottom-right-radius:4px;color:var(--text)}
  .msg-time{font-size:10.5px;color:var(--text-muted);margin-top:4px;text-align:right}
  .msg .msg-time{text-align:left}
  .chat-input-area{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 15px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:border .2s}
  .chat-input:focus{border-color:var(--accent)}
  .send-btn{width:40px;height:40px;background:var(--accent);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#000;transition:all .2s;flex-shrink:0}
  .send-btn:hover{background:var(--accent2)}

  /* ══════════════════════════════════════
     MODAL
  ══════════════════════════════════════ */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 30px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
  .modal h3{font-size:18px;font-weight:700;margin-bottom:20px}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--text-soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:border .2s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:80px}
  .field select option{background:var(--surface2)}

  /* ══════════════════════════════════════
     CALENDAR
  ══════════════════════════════════════ */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:16px}
  .cal-day-header{text-align:center;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;padding:8px 0}
  .cal-day{background:var(--surface2);border:1px solid var(--border);border-radius:9px;min-height:80px;padding:8px;cursor:pointer;transition:border .2s}
  .cal-day:hover{border-color:var(--accent)}
  .cal-day.today{border-color:var(--accent);background:var(--accent-dim)}
  .cal-day.empty{background:transparent;border-color:transparent}
  .cal-date{font-size:12px;font-weight:600;margin-bottom:4px}
  .cal-day.today .cal-date{color:var(--accent)}
  .cal-event{font-size:10px;background:var(--blue);color:#fff;border-radius:4px;padding:2px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-event.task{background:var(--accent);color:#000}
  .cal-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .cal-month{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
  .cal-nav{display:flex;gap:8px}
  .cal-nav button{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);width:32px;height:32px;cursor:pointer;font-size:14px;transition:all .2s}
  .cal-nav button:hover{border-color:var(--accent)}

  /* ── ATTENDANCE GRID ── */
  .attend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:20px}
  .attend-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px}
  .attend-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;flex-shrink:0}
  .attend-info .an{font-size:13.5px;font-weight:600}
  .attend-info .at{font-size:12px;color:var(--text-muted);margin-top:2px}

  /* ── GROUPS ── */
  .groups-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s}
  .group-card:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-2px)}
  .group-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px}
  .group-card h4{font-size:14.5px;font-weight:600;margin-bottom:6px}
  .group-card p{font-size:12.5px;color:var(--text-muted);margin-bottom:14px}
  .group-meta{display:flex;align-items:center;justify-content:space-between}

  /* ── MEETINGS ── */
  .meetings-list{display:flex;flex-direction:column;gap:14px}
  .meet-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;align-items:center;gap:18px}
  .meet-time{text-align:center;flex-shrink:0;width:58px}
  .meet-time .mdate{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--accent);line-height:1}
  .meet-time .mmon{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
  .meet-divider{width:1px;height:50px;background:var(--border);flex-shrink:0}
  .meet-info{flex:1}
  .meet-info h4{font-size:15px;font-weight:600;margin-bottom:5px}
  .meet-info p{font-size:12.5px;color:var(--text-muted)}
  .meet-link{padding:8px 16px;border-radius:8px;background:rgba(59,130,246,0.12);color:var(--blue);font-size:12.5px;font-weight:600;border:1px solid rgba(59,130,246,0.2);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
  .meet-link:hover{background:rgba(59,130,246,0.2)}

  /* ── PRODUCTIVITY ── */
  .prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
  .prod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
  .prod-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
  .prod-row:last-child{border-bottom:none}
  .prod-name{font-size:13.5px;font-weight:500}
  .prod-score{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}

  /* ── INTERN MY TASKS ── */
  .task-kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .kanban-header{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:13.5px;display:flex;align-items:center;justify-content:space-between}
  .kanban-count{background:var(--surface2);border-radius:20px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .kanban-body{padding:10px;display:flex;flex-direction:column;gap:10px}
  .task-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s}
  .task-card:hover{border-color:rgba(255,255,255,0.12)}
  .task-card h5{font-size:13.5px;font-weight:600;margin-bottom:6px}
  .task-card p{font-size:12px;color:var(--text-muted);margin-bottom:10px;line-height:1.5}
  .task-card-meta{display:flex;align-items:center;justify-content:space-between}
  .task-due{font-size:11px;color:var(--text-muted)}

  /* ── NOTIFICATION PANEL ── */
  .notif-list{display:flex;flex-direction:column;gap:12px}
  .notif-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:all .2s}
  .notif-item:hover{border-color:rgba(255,255,255,0.1)}
  .notif-item.unread{border-left:2px solid var(--accent)}
  .notif-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
  .notif-body h5{font-size:13.5px;font-weight:600;margin-bottom:3px}
  .notif-body p{font-size:12.5px;color:var(--text-muted)}
  .notif-time{font-size:11px;color:var(--text-muted);margin-top:4px}

  /* ── REPORT SUBMIT ── */
  .report-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:600px}
  .upload-zone{border:2px dashed var(--border);border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px}
  .upload-zone:hover{border-color:var(--accent)}
  .upload-zone p{font-size:13px;color:var(--text-muted);margin-top:8px}

  /* ── RESPONSIVE ── */
  @media(max-width:900px){
    .stats-grid{grid-template-columns:1fr 1fr}
    .charts-row{grid-template-columns:1fr}
    .groups-grid{grid-template-columns:1fr 1fr}
    .task-kanban{grid-template-columns:1fr}
  }
</style>
</head>

function selectRole(r){
  currentRole=r;
  document.getElementById('tabAdmin').classList.toggle('active',r==='admin');
  document.getElementById('tabIntern').classList.toggle('active',r==='intern');
}

function doLogin(){
  const name=document.getElementById('loginName').value.trim();
  const email=document.getElementById('loginEmail').value.trim();
  if(!name){showToast('Please enter your name','error');return;}
  if(!email.endsWith('@jobjockey.in')){showToast('Only @jobjockey.in emails allowed','error');return;}
  currentUser=name;
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appLayout').classList.remove('hidden');
  initApp();
}

function doLogout(){
  document.getElementById('appLayout').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('loginName').value='';
  document.getElementById('loginEmail').value='';
  // destroy charts
  Object.values(chatCharts).forEach(c=>c&&c.destroy&&c.destroy());
  chatCharts={};
  showToast('Signed out successfully','info');
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function initApp(){
  const nav=currentRole==='admin'?ADMIN_NAV:INTERN_NAV;
  const sidebarNav=document.getElementById('sidebarNav');
  const initials=currentUser.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('sidebarAvatar').textContent=initials;
  document.getElementById('sidebarName').textContent=currentUser;
  document.getElementById('sidebarRole').textContent=currentRole==='admin'?'Administrator':'Intern';

  sidebarNav.innerHTML='';
  nav.forEach(section=>{
    sidebarNav.innerHTML+=`<div class="nav-section-label">${section.label}</div>`;
    section.items.forEach(item=>{
      sidebarNav.innerHTML+=`<button class="nav-item" id="nav_${item.id}" onclick="navTo('${item.id}')">${item.icon}<span>${item.label}</span></button>`;
    });
  });
  navTo('dashboard');
}

function navTo(id){
  currentSection=id;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.id===`nav_${id}`);
  });
  const titles={
    dashboard:'Dashboard',candidates:'Candidates',tasks:'Tasks',projects:'Projects',
    attendance:'Attendance',reports:'Reports',productivity:'Productivity',
    chat:'Chat',groups:'Groups',meetings:'Meetings',calendar:'Calendar',
    notifications:'Notifications',mytasks:'My Tasks'
  };
  const subs={
    dashboard:'Overview of all activities',candidates:'Manage applicants from Google Form',
    tasks:'Assign and track intern tasks',projects:'Project groups and progress',
    attendance:'Daily attendance overview',reports:'Work reports and submissions',
    productivity:'Intern performance metrics',chat:'Messages and team channels',
    groups:'Project and department teams',meetings:'Scheduled meetings and Google Meet links',
    calendar:'Events, tasks, and meeting schedule',notifications:'Your alerts and updates',
    mytasks:'Your assigned tasks'
  };
  document.getElementById('pageTitle').textContent=titles[id]||id;
  document.getElementById('pageSubtitle').textContent=subs[id]||'';

  // Destroy old charts before re-rendering
  Object.values(chatCharts).forEach(c=>c&&c.destroy&&c.destroy());
  chatCharts={};

  const renders={
    dashboard:renderDashboard,candidates:renderCandidates,tasks:renderTasks,
    projects:renderProjects,attendance:renderAttendance,reports:renderReports,
    productivity:renderProductivity,chat:renderChat,groups:renderGroups,
    meetings:renderMeetings,calendar:renderCalendar,notifications:renderNotifications,
    mytasks:renderMyTasks
  };
  if(renders[id]) renders[id]();
}

function showToast(msg,type=''){
  const area=document.getElementById('toast-area');
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.textContent=msg;
  area.appendChild(t);
  setTimeout(()=>{t.style.animation='fadeOut .3s ease forwards';setTimeout(()=>t.remove(),300)},3000);
}

function openModal(id){document.getElementById(id).classList.remove('hidden')}
function closeModal(id){document.getElementById(id).classList.add('hidden')}

function initChart(id,type,labels,datasets,options={}){
  const ctx=document.getElementById(id);
  if(!ctx)return null;
  const c=new Chart(ctx,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8',font:{family:'DM Sans',size:12}}}},scales:type!=='doughnut'&&type!=='pie'?{x:{ticks:{color:'#64748b',font:{family:'DM Sans'}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#64748b',font:{family:'DM Sans'}},grid:{color:'rgba(255,255,255,0.04)'}}}:{},...options}});
  return c;
}

function statusBadge(s){
  const m={Pending:'badge-amber','In Progress':'badge-blue',Completed:'badge-green',Approved:'badge-green',Rejected:'badge-red',Present:'badge-green',Absent:'badge-red',Leave:'badge-purple'};
  return `<span class="badge ${m[s]||'badge-gray'}">${s}</span>`;
}

function prioritySpan(p){
  const m={High:'priority-high',Medium:'priority-medium',Low:'priority-low'};
  return `<span class="${m[p]||''}">${p}</span>`;
}

function buildCandidateRows(data){
  return data.map((c,i)=>`<tr id="crow_${i}">
    <td><strong>${c.name}</strong></td>
    <td>${c.email}</td>
    <td>${c.phone}</td>
    <td>${c.skill}</td>
    <td>${statusBadge(c.status)}</td>
    <td style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="action-btn action-view" onclick="showToast('Opening resume...','info')">Resume</button>
      ${c.status==='Pending'?`
        <button class="action-btn action-approve" onclick="updateCandidate(${i},'Approved')">Approve</button>
        <button class="action-btn action-reject" onclick="updateCandidate(${i},'Rejected')">Reject</button>
      `:c.status==='Approved'?`<button class="action-btn action-edit" onclick="showToast('${c.name} is already approved','info')">Onboard</button>`:''}
    </td>
  </tr>`).join('');
}

function updateCandidate(i,status){
  candidates[i].status=status;
  document.getElementById('candidateBody').innerHTML=buildCandidateRows(candidates);
  showToast(`${candidates[i].name} ${status.toLowerCase()}`,status==='Approved'?'success':'error');
}

function filterCandidates(q){
  const rows=document.querySelectorAll('#candidateTable tbody tr');
  rows.forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'none'});
}

function filterCandidateStatus(s){
  const rows=document.querySelectorAll('#candidateTable tbody tr');
  rows.forEach(r=>{
    if(!s){r.style.display='';return;}
    r.style.display=r.textContent.includes(s)?'':'none';
  });
}

function renderTasks(){
  document.getElementById('mainContent').innerHTML=`

    <div class="table-card-header">
      <h3>All Tasks</h3>
      <div style="display:flex;gap:8px">
        <select class="filter-select" onchange="filterTaskStatus(this.value)">
          <option value="">All Status</option><option>Pending</option><option>In Progress</option><option>Completed</option>
        </select>
        ${currentRole==='admin'?`<button class="btn-sm btn-accent" onclick="openModal('taskModal')">+ Create Task</button>`:''}
      </div>
    </div>
    <table>
      <thead><tr><th>Task</th><th>Assigned To</th><th>Project</th><th>Priority</th><th>Status</th><th>Deadline</th>${currentRole==='admin'?'<th>Action</th>':''}</tr></thead>
      <tbody id="taskBody">${buildTaskRows()}</tbody>
    </table>
  </div>`;
}

function buildTaskRows(){
  return tasks.map((t,i)=>`<tr>
    <td><strong>${t.title}</strong><br><span style="font-size:11.5px;color:var(--text-muted)">${t.desc}</span></td>
    <td>${t.assigned}</td>
    <td>${t.project}</td>
    <td>${prioritySpan(t.priority)}</td>
    <td>
      <select style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px;cursor:pointer" onchange="updateTaskStatus(${i},this.value)">
        ${['Pending','In Progress','Completed'].map(s=>`<option ${t.status===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </td>
    <td>${t.deadline}</td>
    ${currentRole==='admin'?`<td><button class="action-btn action-reject" onclick="deleteTask(${i})">Remove</button></td>`:''}
  </tr>`).join('');
}

function updateTaskStatus(i,s){tasks[i].status=s;showToast(`Task marked as ${s}`,'success')}
function deleteTask(i){tasks.splice(i,1);renderTasks();showToast('Task removed','error')}
function filterTaskStatus(s){
  const rows=document.querySelectorAll('#taskBody tr');
  rows.forEach(r=>{r.style.display=!s||r.textContent.includes(s)?'':'none'});
}

function createTask(){
  const title=document.getElementById('tTitle').value.trim();
  if(!title){showToast('Please enter a task title','error');return;}
  tasks.unshift({
    id:Date.now(),title,
    desc:document.getElementById('tDesc').value||'—',
    assigned:document.getElementById('tAssign').value,
    priority:document.getElementById('tPriority').value,
    status:'Pending',
    deadline:document.getElementById('tDeadline').value||'TBD',
    project:document.getElementById('tProject').value
  });
  closeModal('taskModal');
  showToast('Task created successfully!','success');
  if(currentSection==='tasks'||currentSection==='dashboard') navTo(currentSection);
}

function renderChat(){
  document.getElementById('mainContent').innerHTML=`
  <div class="chat-layout">
    <div class="chat-sidebar">
      <div class="chat-sidebar-header">Messages</div>
      <div class="chat-search"><input placeholder="Search chats..." id="chatSearchInput" oninput="filterChats(this.value)"></div>
      <div class="chat-list" id="chatList">
        ${chatContacts.map(c=>`
        <div class="chat-contact ${c.id===activeChatId?'active':''}" id="cc_${c.id}" onclick="openChat('${c.id}')">
          <div class="cav" style="background:${c.color}22;color:${c.color};border-color:${c.color}44">${c.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
          <div class="cinfo">
            <div class="cname">${c.name}</div>
            <div class="clast">${c.last}</div>
          </div>
          ${c.unread?`<div class="chat-unread">${c.unread}</div>`:''}
        </div>`).join('')}
      </div>
    </div>
    <div class="chat-area" id="chatArea">${buildChatArea(activeChatId)}</div>
  </div>`;
}

function buildChatArea(id){
  const c=chatContacts.find(x=>x.id===id);
  if(!c)return'';
  const msgs=chatMessages[id]||[];
  return `
  <div class="chat-header">
    <div class="cav" style="background:${c.color}22;color:${c.color};border:2px solid ${c.color}44">${c.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
    <div class="chat-header-info">
      <div class="cn">${c.name}</div>
      <div class="cs">● Active now</div>
    </div>
  </div>
  <div class="chat-messages" id="chatMsgs">
    ${msgs.map(m=>`
    <div class="msg ${m.me?'me':''}">
      ${!m.me?`<div class="msg-avatar" style="background:${c.color}22;color:${c.color}">${c.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>`:''}
      <div>
        <div class="msg-bubble">${m.text}</div>
        <div class="msg-time">${m.time}</div>
      </div>
    </div>`).join('')}
  </div>
  <div class="chat-input-area">
    <input class="chat-input" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg('${id}')">
    <button class="send-btn" onclick="sendMsg('${id}')">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>`;
}

function openChat(id){
  activeChatId=id;
  const c=chatContacts.find(x=>x.id===id);
  if(c)c.unread=0;
  document.querySelectorAll('.chat-contact').forEach(el=>el.classList.toggle('active',el.id===`cc_${id}`));
  document.getElementById('chatArea').innerHTML=buildChatArea(id);
}

function sendMsg(id){
  const inp=document.getElementById('chatInput');
  const txt=inp.value.trim();
  if(!txt)return;
  const now=new Date();
  const time=now.toLocaleTimeString('en-IN',{hour:'numeric',minute:'2-digit'});
  if(!chatMessages[id])chatMessages[id]=[];
  chatMessages[id].push({me:true,text:txt,time});
  // Update last message
  const c=chatContacts.find(x=>x.id===id);
  if(c)c.last=txt;
  inp.value='';
  const msgs=document.getElementById('chatMsgs');
  if(msgs){
    msgs.innerHTML+=`<div class="msg me"><div><div class="msg-bubble">${txt}</div><div class="msg-time">${time}</div></div></div>`;
    msgs.scrollTop=msgs.scrollHeight;
  }
  // Simulate reply
  setTimeout(()=>{
    const replies=['Got it! 👍','Sure, I\'ll check.','On it!','Thanks for the update.','Will do!','Noted ✓'];
    const reply=replies[Math.floor(Math.random()*replies.length)];
    chatMessages[id].push({me:false,text:reply,time});
    if(msgs){
      msgs.innerHTML+=`<div class="msg"><div class="msg-avatar" style="background:${c.color}22;color:${c.color}">${c.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div><div><div class="msg-bubble">${reply}</div><div class="msg-time">${time}</div></div></div>`;
      msgs.scrollTop=msgs.scrollHeight;
    }
  },1200);
}

function filterChats(q){
  document.querySelectorAll('.chat-contact').forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

// CALENDAR
// ═══════════════════════════════════════════════
let calDate=new Date();
function renderCalendar(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  const monthName=calDate.toLocaleString('en',{month:'long',year:'numeric'});
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();

  const events={8:['Sprint Planning','task'],10:['Design Review'],12:['Candidate Interview'],15:['Demo Day','task'],20:['task']};

  let cells='';
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const ev=events[d]||[];
    cells+=`<div class="cal-day ${isToday?'today':''}">
      <div class="cal-date">${d}</div>
      ${ev.map((e,i)=>`<div class="cal-event ${i===1?'task':''}">${e}</div>`).join('')}
    </div>`;
  }

  document.getElementById('mainContent').innerHTML=`
  <div class="chart-card" style="padding:24px">
    <div class="cal-controls">
      <div class="cal-month">${monthName}</div>
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-grid">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-day-header">${d}</div>`).join('')}
      ${cells}
    </div>
    <div style="display:flex;gap:14px;margin-top:16px">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)"><div style="width:10px;height:10px;border-radius:3px;background:var(--blue)"></div>Meeting</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)"><div style="width:10px;height:10px;border-radius:3px;background:var(--accent)"></div>Task Deadline</div>
    </div>
  </div>`;
}

function changeMonth(d){calDate.setMonth(calDate.getMonth()+d);renderCalendar()}

// MY TASKS (INTERN)

function renderMyTasks(){
  const myTasks=tasks.filter(t=>t.assigned===currentUser)||tasks.slice(0,3);
  const pending=myTasks.filter(t=>t.status==='Pending');
  const inProg=myTasks.filter(t=>t.status==='In Progress');
  const done=myTasks.filter(t=>t.status==='Completed');

  function taskCard(t,i){
    return `<div class="task-card">
      <h5>${t.title}</h5>
      <p>${t.desc}</p>
      <div class="task-card-meta">
        ${prioritySpan(t.priority)}
        <span class="task-due">📅 ${t.deadline}</span>
      </div>
      <div style="margin-top:10px">
        <select style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12.5px;cursor:pointer" onchange="updateTaskStatus(${tasks.indexOf(t)},this.value);renderMyTasks()">
          ${['Pending','In Progress','Completed'].map(s=>`<option ${t.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>`;
  }

  document.getElementById('mainContent').innerHTML=`
  <div class="task-kanban">
    <div class="kanban-col">
      <div class="kanban-header" style="border-top:2px solid var(--accent)">Pending <span class="kanban-count">${pending.length||tasks.filter(t=>t.status==='Pending').length}</span></div>
      <div class="kanban-body">${(pending.length?pending:tasks.filter(t=>t.status==='Pending')).map((t,i)=>taskCard(t,i)).join('')}</div>
    </div>
    <div class="kanban-col">
      <div class="kanban-header" style="border-top:2px solid var(--blue)">In Progress <span class="kanban-count">${inProg.length||tasks.filter(t=>t.status==='In Progress').length}</span></div>
      <div class="kanban-body">${(inProg.length?inProg:tasks.filter(t=>t.status==='In Progress')).map((t,i)=>taskCard(t,i)).join('')}</div>
    </div>
    <div class="kanban-col">
      <div class="kanban-header" style="border-top:2px solid var(--green)">Completed <span class="kanban-count">${done.length||tasks.filter(t=>t.status==='Completed').length}</span></div>
      <div class="kanban-body">${(done.length?done:tasks.filter(t=>t.status==='Completed')).map((t,i)=>taskCard(t,i)).join('')}</div>
    </div>
  </div>`;
}
